<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Bienvenue sur Mon Site</h1>
    <p>Une plateforme interactive pour créateurs et utilisateurs</p>
  </header>

  <nav>
    <a href="index.html">Accueil</a>
    <a href="conditions.html">Conditions</a>
    <a href="contact.html">Contact</a>
    <a href="contenus.html">Contenus</a>
    <a href="paiement.html">Paiement</a>
    <a href="profil.html">Profil</a>
    <a href="admin.html">Admin</a>
  </nav>

  <main>
    <section id="inscription">
      <h2>Inscription</h2>
      <form>
        <input type="text" placeholder="Nom" required>
        <input type="text" placeholder="Prénom(s)" required>
        <input type="text" placeholder="Nom d’utilisateur" required>
        <input type="email" placeholder="Adresse e-mail" required>
        <input type="tel" placeholder="Numéro de téléphone" required>
        <input type="password" placeholder="Mot de passe" required>
        <input type="password" placeholder="Confirmer mot de passe" required>
        <select required>
          <option value="">Choisir votre pays</option>
          <option value="fr">France</option>
          <option value="bj">Bénin</option>
          <option value="sn">Sénégal</option>
          <option value="us">États-Unis</option>
        </select>
        <select required>
          <option value="">Mode de paiement</option>
          <option>Carte bancaire</option>
          <option>PayPal</option>
          <option>Mobile Money</option>
        </select>
        <button type="submit">S’inscrire</button>
      </form>
    </section>

    <section id="connexion">
      <h2>Connexion Admin</h2>
      <form>
        <input type="text" placeholder="Nom d’utilisateur" required>
        <input type="password" placeholder="Mot de passe" required>
        <button type="submit">Connexion</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Mon Site - Tous droits réservés</p>
  </footer>
</body>
</html>
